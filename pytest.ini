[pytest]
# Where to discover tests
testpaths = scripts/tests

# Custom markers — registering them prevents PytestUnknownMarkWarning
markers =
    slow: heavy integration tests (full IQM load, full enricher, full scorer);
        deselected by default in dev. Run with:  pytest -m slow  or  pytest -m ""
        for the entire suite.
    live: tests that hit live external APIs (PubMed, UMLS, RxNorm). Gated by
        PHARMAGUIDE_LIVE_TESTS=1. Already isolated in test_*_live.py files.
    network: any test that touches the internet (broader than `live`).
    dr_pham: Dr Pham clinical sign-off regression guards (B35 series).

# Default options:
#   -ra              show summary of any non-pass results at the end
#   --strict-markers unknown markers become errors (catches typos)
#
# Default behavior runs the FULL suite (accuracy first). Markers exist for
# explicit opt-in to fast iteration:
#   pytest                     # full suite, every test (~4 min)
#   pytest -m "not slow"       # quick subset for tight dev loop (~30s)
#   pytest -m "slow"           # only the heavy integration tests
#   pytest -n auto             # parallel full suite (~1 min) — needs pytest-xdist
addopts = -ra --strict-markers

# Filter known-noisy warnings that are not actionable in this codebase.
filterwarnings =
    ignore::DeprecationWarning:google.protobuf
    ignore::DeprecationWarning:requests.compat
    ignore:.*urllib3.*OpenSSL.*:Warning

# Optional: faster test collection on large suites
norecursedirs = .git .tox .venv build dist node_modules __pycache__ scripts/products scripts/dist

# Test discovery patterns (defaults are fine, listed for clarity)
python_files = test_*.py
python_classes = Test*
python_functions = test_*
